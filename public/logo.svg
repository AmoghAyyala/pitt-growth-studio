<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 68" width="320" height="68" role="img" aria-label="Pittsburgh Growth Studio">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="wordmarkGlow" x="-10%" y="-30%" width="130%" height="180%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- === Icon: ascending growth bars + upward arrow === -->

  <!-- Bar 1 – shortest -->
  <rect x="4"  y="44" width="11" height="18" rx="2.5" fill="url(#barGrad)"/>
  <!-- Bar 2 – medium -->
  <rect x="19" y="30" width="11" height="32" rx="2.5" fill="url(#barGrad)"/>
  <!-- Bar 3 – tallest -->
  <rect x="34" y="16" width="11" height="46" rx="2.5" fill="url(#barGrad)"/>

  <!-- Upward arrow above bar 3 -->
  <polygon points="39.5,4 31,15 48,15" fill="url(#arrowGrad)"/>

  <!-- Thin vertical divider -->
  <line x1="64" y1="10" x2="64" y2="58" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === Wordmark === -->

  <!-- "PITTSBURGH" – small caps / tracking -->
  <text
    x="76" y="30"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#cbd5e1"
    letter-spacing="3"
    text-rendering="geometricPrecision"
    filter="url(#wordmarkGlow)"
  >PITTSBURGH</text>

  <!-- "Growth Studio" – bold display text -->
  <text
    x="76" y="54"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#f8fafc"
    letter-spacing="0.5"
    text-rendering="geometricPrecision"
    filter="url(#wordmarkGlow)"
  >Growth Studio</text>
</svg>
